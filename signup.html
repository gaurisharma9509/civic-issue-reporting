<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* 🌌 Animated Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e293b);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 💎 Glass Box */
.box {
    width: 450px;
    padding: 50px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

h2 {
    font-size: 28px;
    margin-bottom: 25px;
}

/* ✨ Inputs (WHITE) */
.input-group {
    position: relative;
}

input {
    width: 100%;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: #ffffff;
    color: #000;
}

/* 👁 Toggle */
.toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: black;
}

/* 🚀 Button */
button {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #2bb3b3, #00d4ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* ⚠ Message */
.message {
    margin-top: 15px;
    font-size: 15px;
}

/* 🔗 */
.extra {
    margin-top: 20px;
    font-size: 14px;
}

.extra a {
    color: #00d4ff;
    text-decoration: none;
}

/* 📱 Responsive */
@media(max-width: 500px){
    .box {
        width: 90%;
        padding: 30px;
    }
}
</style>
</head>

<body>

<div class="box">
    <h2>Create Account 🚀</h2>

    <div class="input-group">
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
        <span class="toggle" onclick="togglePassword()">👁</span>
    </div>

    <button onclick="signup()">Signup</button>

    <div class="message" id="msg"></div>

    <div class="extra">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1VlG4lXsJ7x0k6t_UdfEXULlIf1QaT3Q",
  authDomain: "civicissuereportingplatform.firebaseapp.com",
  projectId: "civicissuereportingplatform",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 👁 Toggle */
window.togglePassword = function() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* 🚀 Signup */
window.signup = async function() {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    if (!name || !email || !password) {
        msg.innerText = "Please fill all fields ❌";
        return;
    }

    msg.innerText = "Creating account...";

    try {
        const q = query(collection(db, "users"), where("email", "==", email));
        const snap = await getDocs(q);

        if (!snap.empty) {
            msg.innerText = "User already exists ⚠";
            return;
        }

        await addDoc(collection(db, "users"), {
            name,
            email,
            password,
            createdAt: new Date()
        });

        msg.style.color = "#90ee90";
        msg.innerText = "Signup successful ✅";

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1200);

    } catch (err) {
        msg.innerText = "Error: " + err.message;
    }
}
</script>

</body>
</html>
