<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civic Issue Reporting Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* 🔥 SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px;
    box-shadow: 5px 0 20px rgba(0,0,0,0.5);
}

.sidebar h4 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    background: rgba(255,255,255,0.05);
}

.sidebar a:hover {
    background: #3b82f6;
}

/* MAIN AREA */
.main-content {
    margin-left: 220px;
    display: flex;
    padding-top: 60px;
    padding-bottom: 120px;
}

/* FORM SECTION */
.form-section {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

/* FORM CARD */
.form-card {
    width: 90%;
    max-width: 500px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 50px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

/* INPUTS */
.form-control {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
}

.form-control::placeholder {
    color: #cbd5f5;
}

.form-control:focus {
    background: rgba(255,255,255,0.15);
    color: white;
    box-shadow: none;
}

/* SELECT */
select.form-control {
    background: rgba(255,255,255,0.1);
    color: white;
    border: none;
}

select.form-control option {
    background: #1e293b;
    color: white;
}

select.form-control:invalid {
    color: #cbd5f5;
}

/* READONLY AI FIELDS */
input[readonly] {
    background: rgba(59,130,246,0.15) !important;
    border: 1px solid rgba(59,130,246,0.3);
    color: #93c5fd !important;
    font-weight: 500;
}

/* BUTTON */
.btn-primary {
    background: #3b82f6;
    border: none;
}

/* IMAGE FEED */
.image-feed {
    width: 260px;
    overflow: hidden;
    border-left: 1px solid rgba(255,255,255,0.1);
}

/* SCROLL */
#imageScroll {
    display: flex;
    flex-direction: column;
    animation: scrollUp 20s linear infinite;
}

.image-card {
    margin: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.image-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

@keyframes scrollUp {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); }
}

/* BOTTOM STATS */
.bottom-stats {
    position: fixed;
    bottom: 0;
    left: 220px;
    width: calc(100% - 220px);
    display: flex;
    justify-content: space-around;
    padding: 18px 0;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 -5px 30px rgba(59,130,246,0.3);
}

.stat-box {
    text-align: center;
}

.stat-number {
    font-size: 38px;
    font-weight: bold;
    text-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.stat-label {
    font-size: 13px;
    color: #cbd5f5;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>⚡ Civic Issues</h4>
    <a href="index.html">🏠 Report Issue</a>
    <a href="map.html">🗺️ View Map</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="admin.html">⚙️ Admin Panel</a>
</div>

<!-- MAIN -->
<div class="main-content">

    <!-- FORM -->
    <div class="form-section">
        <div class="form-card">
            <h3 class="text-center mb-3">🚨 Report Issue</h3>

            <form id="issueForm">

                <input type="text" class="form-control mb-3" id="title" placeholder="Issue Title" required>

                <select class="form-control mb-3" id="category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option>Road</option>
                    <option>Garbage</option>
                    <option>Water</option>
                    <option>Street Light</option>
                    <option>Drainage</option>
                    <option>Footpath / Sidewalk Issues</option>
                    <option>Bridge Damage</option>
                    <option>Overflowing Dustbins</option>
                    <option>Public Toilet Issue</option>
                    <option>Pothole</option>
                    <option>Other</option>
                </select>

                <input type="text" class="form-control mb-3" id="location" placeholder="Location" required>

                <textarea class="form-control mb-3" id="description" placeholder="Describe the issue"></textarea>

                <input type="file" class="form-control mb-3" id="image">

                <!-- 🤖 AI FIELDS -->
                <input type="text" class="form-control mb-3" id="priority" placeholder="AI Priority" readonly>

                <input type="text" class="form-control mb-3" id="department" placeholder="AI Assigned Department" readonly>

                <input type="text" class="form-control mb-3" id="severity" placeholder="AI Severity" readonly>

                <button class="btn btn-primary w-100">Submit Issue</button>
            </form>
        </div>
    </div>

    <!-- IMAGE FEED -->
    <div class="image-feed">
        <div id="imageScroll"></div>
    </div>

</div>

<!-- BOTTOM STATS -->
<div class="bottom-stats">
    <div class="stat-box">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total Issues</div>
    </div>

    <div class="stat-box">
        <div class="stat-number text-danger" id="pendingCount">0</div>
        <div class="stat-label">Pending</div>
    </div>

    <div class="stat-box">
        <div class="stat-number text-warning" id="progressCount">0</div>
        <div class="stat-label">In Progress</div>
    </div>

    <div class="stat-box">
        <div class="stat-number text-success" id="resolvedCount">0</div>
        <div class="stat-label">Resolved</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
